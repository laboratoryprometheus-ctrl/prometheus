<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Background Website</title>
    <style>
        /* This changes the entire page background */
        body {
            background-color: #000000; 
            color: #ffffff; /* White text for contrast */
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 50px;
        }

        /* This changes the heading color */
        h1 {
            color: #ffcc00; /* Yellow accent color */
        }
    </style>
</head>
<body>

    <h1>Welcome to My Website</h1>
    <p>This is a basic website with a black background and white text.</p>

</body>
</html>
